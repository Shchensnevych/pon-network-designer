<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PON Network Designer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            height: 100vh;
        }

        /* Ліва панель - Інструменти */
        .toolbar {
            background: #16213e;
            border-right: 2px solid #0f3460;
            padding: 20px;
            overflow-y: auto;
        }

        .toolbar h2 {
            color: #00d9ff;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #00d9ff;
            padding-bottom: 10px;
        }

        .tool-section {
            margin-bottom: 25px;
        }

        .tool-section h3 {
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tool-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #0f3460;
            border: 2px solid #00d9ff;
            color: #00d9ff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-btn:hover {
            background: #00d9ff;
            color: #16213e;
            transform: translateX(5px);
        }

        .tool-btn.active {
            background: #00d9ff;
            color: #16213e;
        }

        .tool-btn .icon {
            font-size: 18px;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            width: 100%;
            padding: 12px;
            background: #533483;
            border: 2px solid #a259ff;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s;
            display: block;
        }

        .file-label:hover {
            background: #a259ff;
            transform: scale(1.05);
        }

        /* Центральна панель - Canvas */
        .canvas-container {
            background: #0f3460;
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        #network-canvas {
            display: block;
            cursor: crosshair;
            width: 100%;
            height: 100%;
        }

        .canvas-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(22, 33, 62, 0.9);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            color: #00d9ff;
            border: 1px solid #00d9ff;
        }

        /* Права панель - Властивості */
        .properties {
            background: #16213e;
            border-left: 2px solid #0f3460;
            padding: 20px;
            overflow-y: auto;
        }

        .properties h2 {
            color: #00d9ff;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #00d9ff;
            padding-bottom: 10px;
        }

        .node-card {
            background: #0f3460;
            border: 2px solid #00d9ff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .node-card h3 {
            color: #00d9ff;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .property-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1a1a2e;
        }

        .property-row:last-child {
            border-bottom: none;
        }

        .property-label {
            color: #aaa;
            font-size: 13px;
        }

        .property-value {
            color: #00d9ff;
            font-weight: 600;
            font-size: 13px;
        }

        .signal-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .signal-ok { background: #00ff88; }
        .signal-warning { background: #ffaa00; }
        .signal-error { background: #ff4444; }

        select, input[type="number"] {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #1a1a2e;
            border: 1px solid #00d9ff;
            color: #fff;
            border-radius: 6px;
            font-size: 13px;
        }

        .delete-btn {
            width: 100%;
            padding: 10px;
            background: #ff4444;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .stats-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: white;
        }

        .stat-value {
            font-weight: bold;
            font-size: 16px;
        }

        .export-section {
            margin-top: 20px;
        }

        .export-btn {
            width: 100%;
            padding: 12px;
            background: #00ff88;
            border: none;
            color: #16213e;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .export-btn:hover {
            background: #00cc6a;
        }

        /* Контекстне меню */
        .context-menu {
            position: absolute;
            background: #16213e;
            border: 2px solid #00d9ff;
            border-radius: 8px;
            padding: 5px;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .context-menu-item {
            padding: 10px 20px;
            cursor: pointer;
            color: #fff;
            font-size: 13px;
            border-radius: 4px;
        }

        .context-menu-item:hover {
            background: #00d9ff;
            color: #16213e;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Ліва панель - Інструменти -->
        <div class="toolbar">
            <h2>🛠️ Інструменти</h2>
            
            <div class="tool-section">
                <h3>Карта</h3>
                <label for="map-upload" class="file-label">
                    📁 Завантажити карту
                </label>
                <input type="file" id="map-upload" accept="image/*">
            </div>

            <div class="tool-section">
                <h3>Компоненти</h3>
                <button class="tool-btn" data-tool="olt">
                    <span class="icon">🔷</span> Розмістити OLT
                </button>
                <button class="tool-btn" data-tool="fob">
                    <span class="icon">📦</span> Додати FOB
                </button>
                <button class="tool-btn" data-tool="onu">
                    <span class="icon">🏠</span> Додати ONU (абонент)
                </button>
            </div>

            <div class="tool-section">
                <h3>З'єднання</h3>
                <button class="tool-btn" data-tool="cable">
                    <span class="icon">━</span> Оптичний кабель
                </button>
                <button class="tool-btn" data-tool="patchcord">
                    <span class="icon">━</span> Патчкорд
                </button>
            </div>

            <div class="tool-section">
                <h3>Навігація</h3>
                <button class="tool-btn" data-tool="select">
                    <span class="icon">👆</span> Вибрати (Del - видалити)
                </button>
                <button class="tool-btn" data-tool="pan">
                    <span class="icon">✋</span> Перемістити вид
                </button>
            </div>

            <div class="tool-section">
                <button class="tool-btn" onclick="clearNetwork()" style="border-color: #ff4444; color: #ff4444;">
                    <span class="icon">🗑️</span> Очистити все
                </button>
            </div>
        </div>

        <!-- Центральна панель - Canvas -->
        <div class="canvas-container">
            <canvas id="network-canvas"></canvas>
            <div class="canvas-info" id="canvas-info">
                Режим: Вибір | Натисніть на компонент для налаштування
            </div>

            <!-- Контролери зуму -->
            <div style="position: absolute; bottom: 20px; left: 20px; background: rgba(22, 33, 62, 0.9); padding: 10px; border-radius: 8px; border: 1px solid #00d9ff;">
                <button onclick="zoomIn()" style="width: 40px; height: 40px; background: #00d9ff; border: none; border-radius: 6px; cursor: pointer; font-size: 20px; margin-bottom: 5px; display: block;">+</button>
                <button onclick="zoomOut()" style="width: 40px; height: 40px; background: #00d9ff; border: none; border-radius: 6px; cursor: pointer; font-size: 20px; margin-bottom: 5px; display: block;">−</button>
                <button onclick="resetView()" style="width: 40px; height: 40px; background: #00d9ff; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; display: block;">⊙</button>
                <div style="color: #00d9ff; font-size: 12px; text-align: center; margin-top: 5px;" id="zoom-level">100%</div>
            </div>
        </div>

        <!-- Права панель - Властивості -->
        <div class="properties">
            <h2>⚙️ Властивості</h2>

            <div class="stats-panel">
                <div class="stat-item">
                    <span>Всього FOB:</span>
                    <span class="stat-value" id="total-fobs">0</span>
                </div>
                <div class="stat-item">
                    <span>Всього абонентів:</span>
                    <span class="stat-value" id="total-onus">0</span>
                </div>
                <div class="stat-item">
                    <span>З'єднань:</span>
                    <span class="stat-value" id="total-connections">0</span>
                </div>
            </div>

            <div id="selected-node-properties">
                <p style="color: #888; text-align: center; padding: 20px;">
                    Виберіть компонент для відображення властивостей
                </p>
            </div>

            <div class="export-section">
                <h3 style="color: #00d9ff; margin-bottom: 10px;">Експорт</h3>
                <button class="export-btn" onclick="exportToPNG()">
                    💾 Зберегти схему (PNG)
                </button>
                <button class="export-btn" onclick="exportToJSON()">
                    📄 Зберегти проєкт (JSON)
                </button>
                <button class="export-btn" onclick="generateReport()">
                    📊 Згенерувати звіт
                </button>
            </div>
        </div>
    </div>

    <!-- Контекстне меню -->
    <div class="context-menu" id="context-menu">
        <div class="context-menu-item" onclick="editNode()">✏️ Редагувати</div>
        <div class="context-menu-item" onclick="deleteNode()">🗑️ Видалити</div>
    </div>

    <script>
        // Константи PON
        const FBT_LOSSES = {
            '5/95':  { x: 13.7,  y: 0.32 },
            '10/90': { x: 10.08, y: 0.49 },
            '20/80': { x: 7.11,  y: 1.06 },
            '30/70': { x: 5.39,  y: 1.56 },
            '50/50': { x: 3.17,  y: 3.19 }
        };

        const PLC_LOSSES = {
            '1x2':  4.3,
            '1x4':  7.4,
            '1x8':  10.7,
            '1x16': 13.9,
            '1x32': 17.2,
            '1x64': 21.5
        };

        const OLT_OUTPUT = 2;
        const MECHANICAL_LOSS = 0.5;
        const ONU_THRESHOLD = -26;

        // Глобальні змінні
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        
        let currentTool = 'select';
        let backgroundImage = null;
        let nodes = [];
        let connections = [];
        let selectedNode = null;
        let isDragging = false;
        let dragStartX, dragStartY;
        let offsetX = 0, offsetY = 0;
        let scale = 1;
        let connectionStart = null;

        // Налаштування canvas
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            draw();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Зум колесом миші
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Зберігаємо позицію миші відносно canvas
            const worldX = (mouseX - offsetX) / scale;
            const worldY = (mouseY - offsetY) / scale;

            // Змінюємо масштаб
            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= zoomFactor;
            scale = Math.max(0.1, Math.min(5, scale)); // Обмеження 10% - 500%

            // Коригуємо offset щоб зум був відносно миші
            offsetX = mouseX - worldX * scale;
            offsetY = mouseY - worldY * scale;

            updateZoomDisplay();
            draw();
        });

        // Функції зуму
        function zoomIn() {
            scale *= 1.2;
            scale = Math.min(5, scale);
            updateZoomDisplay();
            draw();
        }

        function zoomOut() {
            scale *= 0.8;
            scale = Math.max(0.1, scale);
            updateZoomDisplay();
            draw();
        }

        function resetView() {
            scale = 1;
            offsetX = 0;
            offsetY = 0;
            updateZoomDisplay();
            draw();
        }

        function updateZoomDisplay() {
            document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
        }

        // Завантаження карти
        document.getElementById('map-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    backgroundImage = new Image();
                    backgroundImage.onload = () => {
                        draw();
                    };
                    backgroundImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Вибір інструменту
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                updateCanvasInfo();
            });
        });

        // Оновлення інфо про поточний режим
        function updateCanvasInfo() {
            const infoMap = {
                'select': '👆 Вибір: Клік на об\'єкт | Del - видалити | Колесо миші - зум',
                'olt': '🔷 OLT: Клік для розміщення головного терміналу',
                'fob': '📦 FOB: Клік для розміщення оптичного боксу',
                'onu': '🏠 ONU: Клік для розміщення абонентського терміналу',
                'cable': '━ Кабель: Клік на початок → клік на кінець',
                'patchcord': '━ Патчкорд: Клік на початок → клік на кінець',
                'pan': '✋ Перемістити: Drag для переміщення виду | Колесо миші - зум'
            };
            document.getElementById('canvas-info').textContent = infoMap[currentTool] || '';
        }

        // Клік на canvas
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left - offsetX) / scale;
            const y = (e.clientY - rect.top - offsetY) / scale;

            if (currentTool === 'select') {
                selectedNode = getNodeAtPosition(x, y);
                if (selectedNode) {
                    isDragging = true;
                    dragStartX = x - selectedNode.x;
                    dragStartY = y - selectedNode.y;
                    showNodeProperties(selectedNode);
                } else {
                    showNodeProperties(null);
                }
                draw();
            } else if (currentTool === 'olt') {
                addNode('OLT', x, y);
            } else if (currentTool === 'fob') {
                addNode('FOB', x, y);
            } else if (currentTool === 'onu') {
                addNode('ONU', x, y);
            } else if (currentTool === 'cable' || currentTool === 'patchcord') {
                const node = getNodeAtPosition(x, y);
                if (node) {
                    if (!connectionStart) {
                        connectionStart = node;
                    } else {
                        addConnection(connectionStart, node, currentTool);
                        connectionStart = null;
                    }
                }
            } else if (currentTool === 'pan') {
                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left - offsetX) / scale;
            const y = (e.clientY - rect.top - offsetY) / scale;

            if (currentTool === 'select' && selectedNode) {
                selectedNode.x = x - dragStartX;
                selectedNode.y = y - dragStartY;
                draw();
            } else if (currentTool === 'pan') {
                offsetX += e.clientX - dragStartX;
                offsetY += e.clientY - dragStartY;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                draw();
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Видалення об'єкта
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' && selectedNode) {
                nodes = nodes.filter(n => n !== selectedNode);
                connections = connections.filter(c => c.from !== selectedNode && c.to !== selectedNode);
                selectedNode = null;
                showNodeProperties(null);
                draw();
                updateStats();
            }
        });

        // Додавання вузла
        function addNode(type, x, y) {
            const node = {
                id: Date.now(),
                type: type,
                x: x,
                y: y,
                fbtType: '20/80',
                fbtBranch: 'y',
                plcType: '1x8',
                subscribers: 8
            };
            nodes.push(node);
            draw();
            updateStats();
        }

        // Додавання з'єднання
        function addConnection(from, to, type) {
            connections.push({ from, to, type });
            draw();
            updateStats();
        }

        // Знаходження вузла
        function getNodeAtPosition(x, y) {
            for (let i = nodes.length - 1; i >= 0; i--) {
                const node = nodes[i];
                const size = node.type === 'OLT' ? 30 : (node.type === 'FOB' ? 20 : 15);
                if (Math.abs(node.x - x) < size && Math.abs(node.y - y) < size) {
                    return node;
                }
            }
            return null;
        }

        // Малювання
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            // Фон (карта) - масштабуємо під розмір canvas
            if (backgroundImage) {
                const maxWidth = canvas.width / scale;
                const maxHeight = canvas.height / scale;
                
                // Зберігаємо пропорції
                let imgWidth = backgroundImage.width;
                let imgHeight = backgroundImage.height;
                
                // Якщо картинка більша за canvas, зменшуємо
                if (imgWidth > maxWidth || imgHeight > maxHeight) {
                    const scaleX = maxWidth / imgWidth;
                    const scaleY = maxHeight / imgHeight;
                    const imgScale = Math.min(scaleX, scaleY);
                    
                    imgWidth *= imgScale;
                    imgHeight *= imgScale;
                }
                
                ctx.drawImage(backgroundImage, 0, 0, imgWidth, imgHeight);
            } else {
                // Якщо немає карти - малюємо сітку
                ctx.strokeStyle = 'rgba(0, 217, 255, 0.1)';
                ctx.lineWidth = 1;
                const gridSize = 50;
                
                for (let x = 0; x < canvas.width / scale; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height / scale);
                    ctx.stroke();
                }
                
                for (let y = 0; y < canvas.height / scale; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width / scale, y);
                    ctx.stroke();
                }
            }

            // З'єднання
            connections.forEach(conn => {
                ctx.beginPath();
                ctx.moveTo(conn.from.x, conn.from.y);
                ctx.lineTo(conn.to.x, conn.to.y);
                ctx.strokeStyle = conn.type === 'cable' ? '#000' : '#ffd700';
                ctx.lineWidth = conn.type === 'cable' ? 3 : 2;
                ctx.stroke();
            });

            // Вузли
            nodes.forEach(node => {
                const isSelected = node === selectedNode;
                
                if (node.type === 'OLT') {
                    ctx.fillStyle = isSelected ? '#00ffff' : '#0066ff';
                    ctx.fillRect(node.x - 15, node.y - 15, 30, 30);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(node.x - 15, node.y - 15, 30, 30);
                } else if (node.type === 'FOB') {
                    ctx.fillStyle = isSelected ? '#ff6666' : '#ff0000';
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (node.type === 'ONU') {
                    ctx.fillStyle = isSelected ? '#88ff88' : '#00ff00';
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Підпис
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(node.type, node.x, node.y - 20);
            });

            ctx.restore();
        }

        // Показ властивостей вузла
        function showNodeProperties(node) {
            const panel = document.getElementById('selected-node-properties');
            
            if (!node) {
                panel.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">Виберіть компонент</p>';
                return;
            }

            let html = `<div class="node-card">`;
            html += `<h3>${node.type} #${node.id}</h3>`;

            if (node.type === 'FOB') {
                const signal = calculateSignalAtNode(node);
                const status = signal >= ONU_THRESHOLD ? 'ok' : (signal >= ONU_THRESHOLD - 3 ? 'warning' : 'error');
                
                html += `
                    <div class="property-row">
                        <span class="property-label">Сигнал на ONU:</span>
                        <span class="property-value">
                            <span class="signal-indicator signal-${status}"></span>
                            ${signal.toFixed(2)} дБ
                        </span>
                    </div>
                    <label style="display: block; margin-top: 10px; color: #aaa; font-size: 12px;">FBT дільник:</label>
                    <select onchange="updateNodeProperty(${node.id}, 'fbtType', this.value)">
                        ${Object.keys(FBT_LOSSES).map(type => 
                            `<option value="${type}" ${node.fbtType === type ? 'selected' : ''}>${type}</option>`
                        ).join('')}
                    </select>
                    <label style="display: block; margin-top: 10px; color: #aaa; font-size: 12px;">PLC сплітер:</label>
                    <select onchange="updateNodeProperty(${node.id}, 'plcType', this.value)">
                        ${Object.keys(PLC_LOSSES).map(type => 
                            `<option value="${type}" ${node.plcType === type ? 'selected' : ''}>${type}</option>`
                        ).join('')}
                    </select>
                    <label style="display: block; margin-top: 10px; color: #aaa; font-size: 12px;">Абонентів:</label>
                    <input type="number" value="${node.subscribers}" min="1" max="64" 
                           onchange="updateNodeProperty(${node.id}, 'subscribers', parseInt(this.value))">
                `;
            } else if (node.type === 'OLT') {
                html += `
                    <div class="property-row">
                        <span class="property-label">Вихідний сигнал:</span>
                        <span class="property-value">${OLT_OUTPUT} дБ</span>
                    </div>
                `;
            }

            html += `<button class="delete-btn" onclick="deleteSelectedNode()">🗑️ Видалити</button>`;
            html += `</div>`;

            panel.innerHTML = html;
        }

        // Оновлення властивості вузла
        function updateNodeProperty(nodeId, property, value) {
            const node = nodes.find(n => n.id === nodeId);
            if (node) {
                node[property] = value;
                showNodeProperties(node);
                draw();
            }
        }

        // Видалення вибраного вузла
        function deleteSelectedNode() {
            if (selectedNode) {
                nodes = nodes.filter(n => n !== selectedNode);
                connections = connections.filter(c => c.from !== selectedNode && c.to !== selectedNode);
                selectedNode = null;
                showNodeProperties(null);
                draw();
                updateStats();
            }
        }

        // Розрахунок сигналу
        function calculateSignalAtNode(node) {
            let signal = OLT_OUTPUT;

            // Знаходимо шлях від OLT до цього FOB
            const path = findPathToOLT(node);
            
            path.forEach(n => {
                if (n.type === 'FOB') {
                    // FBT втрати
                    if (n.fbtType) {
                        signal -= FBT_LOSSES[n.fbtType][n.fbtBranch];
                        signal -= MECHANICAL_LOSS;
                    }
                    // PLC втрати
                    if (n.plcType) {
                        signal -= PLC_LOSSES[n.plcType];
                        signal -= MECHANICAL_LOSS;
                    }
                }
            });

            return signal;
        }

        // Знаходження шляху до OLT
        function findPathToOLT(node) {
            // Спрощена версія - шукаємо з'єднання назад до OLT
            const path = [node];
            let current = node;

            while (current.type !== 'OLT') {
                const conn = connections.find(c => c.to === current);
                if (!conn) break;
                current = conn.from;
                path.unshift(current);
            }

            return path;
        }

        // Оновлення статистики
        function updateStats() {
            document.getElementById('total-fobs').textContent = nodes.filter(n => n.type === 'FOB').length;
            document.getElementById('total-onus').textContent = nodes.filter(n => n.type === 'ONU').length;
            document.getElementById('total-connections').textContent = connections.length;
        }

        // Очистити мережу
        function clearNetwork() {
            if (confirm('Видалити всю мережу?')) {
                nodes = [];
                connections = [];
                selectedNode = null;
                showNodeProperties(null);
                draw();
                updateStats();
            }
        }

        // Експорт
        function exportToPNG() {
            const link = document.createElement('a');
            link.download = 'pon-network.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function exportToJSON() {
            const project = { nodes, connections };
            const json = JSON.stringify(project, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const link = document.createElement('a');
            link.download = 'pon-network.json';
            link.href = URL.createObjectURL(blob);
            link.click();
        }

        function generateReport() {
            alert('Генерація детального звіту буде додана в наступній версії!');
        }

        // Ініціалізація
        updateCanvasInfo();
        updateStats();
    </script>
</body>
</html>
